<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Network Security Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e4e6eb;
            padding: 40px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2d3a;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #ffffff;
        }

        .header h1 span {
            color: #4ade80;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #9ca3af;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1a1d29;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card.total .value { color: #60a5fa; }
        .stat-card.portscan .value { color: #fb923c; }
        .stat-card.malicious .value { color: #f87171; }

        .table-container {
            background: #1a1d29;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: #12141c;
            color: #9ca3af;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
            padding: 14px 20px;
            border-bottom: 1px solid #2a2d3a;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid #22242f;
            font-size: 14px;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover { background: #20232f; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.PORT_SCAN {
            background: rgba(251, 146, 60, 0.15);
            color: #fb923c;
        }

        .badge.MALICIOUS_IP {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="header">
    <h1>Network Security <span>Monitor</span></h1>
    <div class="status-badge">
        <div class="dot"></div>
        <span id="last-updated">Connecting...</span>
    </div>
    <div>
        <button onclick="startSniffer()" style="background:#4ade80;color:#000;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:600;margin-right:8px;">Start Capture</button>
        <button onclick="stopSniffer()" style="background:#f87171;color:#000;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:600;">Stop Capture</button>
    </div>
</div>

    <div class="stats">
        <div class="stat-card total">
            <div class="label">Total Alerts</div>
            <div class="value" id="stat-total">0</div>
        </div>
        <div class="stat-card portscan">
            <div class="label">Port Scans</div>
            <div class="value" id="stat-portscan">0</div>
        </div>
        <div class="stat-card malicious">
            <div class="label">Malicious IPs</div>
            <div class="value" id="stat-malicious">0</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Timestamp</th>
                    <th>Source IP</th>
                    <th>Alert Type</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody id="alerts-body"></tbody>
        </table>
        <div class="empty" id="empty-state" style="display:none;">No alerts detected yet.</div>
    </div>

    <script>
        async function startSniffer() {
    await fetch('/api/sniffer/start', { method: 'POST' });
    alert('Capture started');
}

async function stopSniffer() {
    await fetch('/api/sniffer/stop', { method: 'POST' });
    alert('Capture stopped');
}
        async function loadAlerts() {
            try {
                const response = await fetch('/alerts');
                const alerts = await response.json();

                const tbody = document.getElementById('alerts-body');
                const emptyState = document.getElementById('empty-state');
                tbody.innerHTML = '';

                if (alerts.length === 0) {
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    alerts.slice().reverse().forEach(alert => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${alert.id}</td>
                            <td>${alert.timestamp}</td>
                            <td>${alert.sourceIp}</td>
                            <td><span class="badge ${alert.alertType}">${alert.alertType}</span></td>
                            <td>${alert.details}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }

                document.getElementById('stat-total').textContent = alerts.length;
                document.getElementById('stat-portscan').textContent =
                    alerts.filter(a => a.alertType === 'PORT_SCAN').length;
                document.getElementById('stat-malicious').textContent =
                    alerts.filter(a => a.alertType === 'MALICIOUS_IP').length;

                document.getElementById('last-updated').textContent =
                    'Live - Updated ' + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('last-updated').textContent = 'Connection error';
            }
        }

        loadAlerts();
        setInterval(loadAlerts, 3000);
    </script>
</body>
</html>
